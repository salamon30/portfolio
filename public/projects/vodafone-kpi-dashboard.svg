<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <pattern id="vf-grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#378ADD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#378ADD" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="vf-glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#378ADD" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#378ADD" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#090e1a"/>
  <rect width="1200" height="675" fill="url(#vf-grid)"/>
  <rect width="1200" height="675" fill="url(#vf-glow)"/>

  <!-- Header bar -->
  <rect width="1200" height="56" fill="rgba(0,0,0,0.65)"/>
  <text x="40" y="35" font-family="'Inter',Arial,sans-serif" font-size="18" font-weight="600" fill="white" letter-spacing="-0.3">Broadband KPI Dashboard</text>
  <text x="40" y="50" font-family="'Inter',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" letter-spacing="1">VODAFONE TÜRKIYE  ·  DATA &amp; ANALYTICS</text>
  <!-- Status dot -->
  <circle cx="1168" cy="28" r="5" fill="#22c55e"/>
  <text x="1155" y="32" text-anchor="end" font-family="'Courier New',monospace" font-size="11" fill="rgba(255,255,255,0.4)">LIVE</text>

  <!-- KPI metric boxes -->
  <!-- Box 1 -->
  <rect x="40" y="80" width="200" height="84" rx="8" fill="rgba(55,138,221,0.12)" stroke="rgba(55,138,221,0.25)" stroke-width="1"/>
  <text x="60" y="110" font-family="'Inter',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="1">MOBILE SUBSCRIBERS</text>
  <text x="60" y="142" font-family="'Courier New',monospace" font-size="28" font-weight="bold" fill="#60a5fa">21.4M</text>
  <text x="172" y="142" font-family="'Inter',Arial,sans-serif" font-size="11" fill="#22c55e">▲ 3.2%</text>

  <!-- Box 2 -->
  <rect x="260" y="80" width="200" height="84" rx="8" fill="rgba(55,138,221,0.12)" stroke="rgba(55,138,221,0.25)" stroke-width="1"/>
  <text x="280" y="110" font-family="'Inter',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="1">FIXED BROADBAND</text>
  <text x="280" y="142" font-family="'Courier New',monospace" font-size="28" font-weight="bold" fill="#60a5fa">5.8M</text>
  <text x="352" y="142" font-family="'Inter',Arial,sans-serif" font-size="11" fill="#22c55e">▲ 1.7%</text>

  <!-- Box 3 -->
  <rect x="480" y="80" width="200" height="84" rx="8" fill="rgba(55,138,221,0.12)" stroke="rgba(55,138,221,0.25)" stroke-width="1"/>
  <text x="500" y="110" font-family="'Inter',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="1">AVG DATA USAGE</text>
  <text x="500" y="142" font-family="'Courier New',monospace" font-size="28" font-weight="bold" fill="#60a5fa">18.3</text>
  <text x="572" y="142" font-family="'Inter',Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.4)">GB/mo</text>

  <!-- Box 4 -->
  <rect x="700" y="80" width="200" height="84" rx="8" fill="rgba(55,138,221,0.12)" stroke="rgba(55,138,221,0.25)" stroke-width="1"/>
  <text x="720" y="110" font-family="'Inter',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="1">NPS SCORE</text>
  <text x="720" y="142" font-family="'Courier New',monospace" font-size="28" font-weight="bold" fill="#60a5fa">62</text>
  <text x="760" y="142" font-family="'Inter',Arial,sans-serif" font-size="11" fill="#f59e0b">→ 0.0</text>

  <!-- MAIN BAR CHART — monthly KPI -->
  <text x="40" y="205" font-family="'Inter',Arial,sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.65)">Mobile KPI — Monthly Performance</text>

  <!-- Y-axis labels -->
  <text x="35" y="578" text-anchor="end" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.25)">0</text>
  <text x="35" y="494" text-anchor="end" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.25)">25</text>
  <text x="35" y="410" text-anchor="end" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.25)">50</text>
  <text x="35" y="326" text-anchor="end" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.25)">75</text>
  <text x="35" y="242" text-anchor="end" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.25)">100</text>

  <!-- Horizontal grid lines -->
  <line x1="44" y1="578" x2="960" y2="578" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="44" y1="494" x2="960" y2="494" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="44" y1="410" x2="960" y2="410" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="44" y1="326" x2="960" y2="326" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <line x1="44" y1="242" x2="960" y2="242" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Bars (12 months) - Mobile (blue) and Fixed (light blue) side by side -->
  <!-- Jan -->
  <rect x="55"  y="358" width="32" height="220" rx="3" fill="url(#bar1)"/>
  <rect x="90"  y="402" width="32" height="176" rx="3" fill="url(#bar2)" opacity="0.7"/>
  <!-- Feb -->
  <rect x="135" y="342" width="32" height="236" rx="3" fill="url(#bar1)"/>
  <rect x="170" y="386" width="32" height="192" rx="3" fill="url(#bar2)" opacity="0.7"/>
  <!-- Mar -->
  <rect x="215" y="328" width="32" height="250" rx="3" fill="url(#bar1)"/>
  <rect x="250" y="374" width="32" height="204" rx="3" fill="url(#bar2)" opacity="0.7"/>
  <!-- Apr -->
  <rect x="295" y="320" width="32" height="258" rx="3" fill="url(#bar1)"/>
  <rect x="330" y="368" width="32" height="210" rx="3" fill="url(#bar2)" opacity="0.7"/>
  <!-- May -->
  <rect x="375" y="310" width="32" height="268" rx="3" fill="url(#bar1)"/>
  <rect x="410" y="354" width="32" height="224" rx="3" fill="url(#bar2)" opacity="0.7"/>
  <!-- Jun -->
  <rect x="455" y="304" width="32" height="274" rx="3" fill="url(#bar1)"/>
  <rect x="490" y="350" width="32" height="228" rx="3" fill="url(#bar2)" opacity="0.7"/>
  <!-- Jul -->
  <rect x="535" y="295" width="32" height="283" rx="3" fill="url(#bar1)"/>
  <rect x="570" y="340" width="32" height="238" rx="3" fill="url(#bar2)" opacity="0.7"/>
  <!-- Aug -->
  <rect x="615" y="288" width="32" height="290" rx="3" fill="url(#bar1)"/>
  <rect x="650" y="332" width="32" height="246" rx="3" fill="url(#bar2)" opacity="0.7"/>
  <!-- Sep -->
  <rect x="695" y="275" width="32" height="303" rx="3" fill="url(#bar1)"/>
  <rect x="730" y="318" width="32" height="260" rx="3" fill="url(#bar2)" opacity="0.7"/>
  <!-- Oct -->
  <rect x="775" y="264" width="32" height="314" rx="3" fill="url(#bar1)"/>
  <rect x="810" y="308" width="32" height="270" rx="3" fill="url(#bar2)" opacity="0.7"/>
  <!-- Nov -->
  <rect x="855" y="250" width="32" height="328" rx="3" fill="url(#bar1)"/>
  <rect x="890" y="294" width="32" height="284" rx="3" fill="url(#bar2)" opacity="0.7"/>

  <!-- Month labels -->
  <text x="71"  y="596" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.3)">JAN</text>
  <text x="151" y="596" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.3)">FEB</text>
  <text x="231" y="596" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.3)">MAR</text>
  <text x="311" y="596" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.3)">APR</text>
  <text x="391" y="596" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.3)">MAY</text>
  <text x="471" y="596" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.3)">JUN</text>
  <text x="551" y="596" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.3)">JUL</text>
  <text x="631" y="596" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.3)">AUG</text>
  <text x="711" y="596" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.3)">SEP</text>
  <text x="791" y="596" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.3)">OCT</text>
  <text x="871" y="596" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.3)">NOV</text>

  <!-- Trend line over bars -->
  <polyline points="71,358 151,342 231,328 311,320 391,310 471,304 551,295 631,288 711,275 791,264 871,250"
            fill="none" stroke="#f59e0b" stroke-width="2" stroke-opacity="0.7" stroke-dasharray="4 3"/>

  <!-- Legend -->
  <rect x="992" y="80" width="168" height="120" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="1008" y="100" font-family="'Inter',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="1">LEGEND</text>
  <rect x="1008" y="114" width="12" height="12" rx="2" fill="#378ADD"/>
  <text x="1026" y="124" font-family="'Inter',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">Mobile BB</text>
  <rect x="1008" y="136" width="12" height="12" rx="2" fill="#60a5fa" opacity="0.7"/>
  <text x="1026" y="146" font-family="'Inter',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">Fixed BB</text>
  <line x1="1008" y1="162" x2="1030" y2="162" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="1036" y="166" font-family="'Inter',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">Trend</text>

  <!-- Stack badges bottom right -->
  <rect x="992" y="560" width="168" height="78" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="1008" y="580" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.3)" letter-spacing="1">STACK</text>
  <text x="1008" y="598" font-family="'Courier New',monospace" font-size="11" fill="rgba(55,138,221,0.8)">SQL  ·  DBeaver</text>
  <text x="1008" y="614" font-family="'Courier New',monospace" font-size="11" fill="rgba(55,138,221,0.8)">Tableau</text>
  <text x="1008" y="628" font-family="'Courier New',monospace" font-size="10" fill="rgba(255,255,255,0.25)">Vodafone TK · 2025</text>
</svg>
